name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Generate icons
        run: bash scripts/generate-icons.sh

      - name: Build Linux package
        run: npm run tauri build

      - name: Locate .deb package
        run: |
          mkdir -p release-assets
          DEB=$(find src-tauri/target/release/bundle/deb -name '*.deb' -print -quit)
          if [ -z "$DEB" ]; then
            echo "No .deb package found. Bundle contents:"
            find src-tauri/target/release/bundle -type f
            exit 1
          fi
          cp "$DEB" release-assets/tansiyon-defteri-linux.deb
          ls -la release-assets/

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: tansiyon-defteri-linux
          path: release-assets/tansiyon-defteri-linux.deb
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Generate icons
        run: npm run tauri icon Logo/logo.png

      - name: Build Windows package
        run: npm run tauri build

      - name: Locate Windows installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $exe = Get-ChildItem -Path src-tauri/target/release/bundle/nsis -Filter *.exe -Recurse |
            Select-Object -First 1
          if (-not $exe) {
            Write-Error "No .exe installer found."
            Get-ChildItem -Path src-tauri/target/release/bundle -Recurse
            exit 1
          }
          Copy-Item $exe.FullName release-assets/tansiyon-defteri-windows.exe
          Get-ChildItem release-assets

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: tansiyon-defteri-windows
          path: release-assets/tansiyon-defteri-windows.exe
          if-no-files-found: error

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name '*.deb' -o -name '*.exe' \) -exec cp {} release-assets/ \;
          echo "Release assets:"
          ls -la release-assets/
          if [ -z "$(ls -A release-assets)" ]; then
            echo "No release assets found"
            find artifacts -type f
            exit 1
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Tansiyon Defteri ${{ github.ref_name }}
          generate_release_notes: true
          files: release-assets/*
